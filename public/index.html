<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberIPTV Cloud System</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --green: #0f0; --dark: #050505; --glass: rgba(0, 255, 0, 0.05); --red: #f33; --yellow: #ff0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', monospace; }
        body { background: var(--dark); color: var(--green); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 10; }

        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; z-index: 5; }
        .tv-icon { font-size: 80px; margin-bottom: 20px; text-shadow: 0 0 15px var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        input, button { background: var(--dark); border: 1px solid var(--green); color: var(--green); padding: 10px 20px; margin: 10px; font-size: 16px; outline: none; transition: 0.3s; width: 280px; }
        input:focus, button:hover { box-shadow: 0 0 10px var(--green); background: var(--glass); }
        button { cursor: pointer; font-weight: bold; width: auto; }

        #app-screen { display: none; height: 100%; flex-direction: row; z-index: 5; }
        #sidebar { width: 320px; border-right: 1px solid var(--green); display: flex; flex-direction: column; background: rgba(0,0,0,0.95); }
        #header { padding: 15px; border-bottom: 1px solid var(--green); display: flex; flex-direction: column; gap: 10px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        #searchInput { width: 100%; margin: 0; padding: 8px; font-size: 14px; }
        
        #channel-list { flex: 1; overflow-y: auto; padding: 10px; }
        .channel-item { padding: 10px; border-bottom: 1px solid #003300; cursor: pointer; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; }
        .channel-item:hover, .channel-item.active { background: var(--green); color: var(--dark); font-weight: bold; }
        
        #main-content { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        video { width: 100%; height: 100%; max-height: 80vh; background: #000; }
        #controls { padding: 15px; border-top: 1px solid var(--green); background: var(--dark); display: flex; flex-direction: column; gap: 8px; }
        .controls-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--green); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="tv-icon">📺</div>
        <h2>CYBER IPTV CLOUD</h2>
        <p style="margin: 15px 0; font-size: 14px; opacity: 0.8;">Carregando listaiptv.txt do servidor...</p>
        <div id="manual-load" class="hidden">
            <p style="font-size: 12px; color: var(--yellow);">️ Falha no auto-load. Selecione manualmente:</p>
            <input type="file" id="fileInput" accept=".txt,.m3u,.m3u8">
            <button onclick="manualLogin()">CARREGAR ARQUIVO</button>
        </div>
    </div>

    <div id="app-screen">
        <div id="sidebar">
            <div id="header">
                <div class="header-top">
                    <span> CANAIS</span>
                    <button onclick="backupSystem()" style="padding: 5px 10px; font-size: 12px; width: auto;">💾 BACKUP</button>
                </div>
                <input type="text" id="searchInput" placeholder="🔍 Pesquisar canal...">
            </div>
            <div id="channel-list"></div>
        </div>
        <div id="main-content">
            <video id="videoPlayer" controls autoplay playsinline></video>
            <div id="controls">
                <div class="controls-row">
                    <span id="current-channel" style="font-weight: bold;"> AGUARDANDO</span>
                    <span id="channel-count">0 canais</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let channels = [];
        let filteredChannels = [];

        async function initSystem() {
            try {
                const response = await fetch('listaiptv.txt');
                if (!response.ok) throw new Error('Arquivo não encontrado');
                processPlaylist(await response.text());
            } catch (error) {
                document.getElementById('manual-load').classList.remove('hidden');
                document.querySelector('#login-screen p').classList.add('hidden');
            }
        }

        function manualLogin() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files.length) return alert('⚠️ Selecione o arquivo');
            const reader = new FileReader();
            reader.onload = (e) => processPlaylist(e.target.result);
            reader.readAsText(fileInput.files[0]);
        }

        function processPlaylist(content) {
            const lines = content.split('\n');
            channels = [];
            let current = {};
            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.*)$/);
                    current.name = nameMatch ? nameMatch[1].trim() : 'Canal Desconhecido';
                } else if (/^https?:\/\//i.test(line)) {
                    current.url = line;
                    channels.push({...current});
                    current = {};
                }
            }
            filteredChannels = [...channels];
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            renderChannels();
        }

        function renderChannels() {
            const list = document.getElementById('channel-list');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            filteredChannels = channels.filter(ch => ch.name.toLowerCase().includes(searchTerm));
            document.getElementById('channel-count').textContent = `${filteredChannels.length} canais`;
            
            list.innerHTML = '';
            filteredChannels.slice(0, 200).forEach((ch) => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.textContent = ch.name;
                div.onclick = () => playChannel(ch, div);
                list.appendChild(div);
            });
        }

        document.getElementById('searchInput').addEventListener('input', renderChannels);

        function playChannel(channel, element) {
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');
            
            const player = document.getElementById('videoPlayer');
            
            // A MÁGICA: Aponta para o nosso próprio servidor proxy, eliminando CORS e Mixed Content
            const proxyUrl = `/proxy?url=${encodeURIComponent(channel.url)}`;

            if (window.currentHls) {
                window.currentHls.destroy();
                window.currentHls = null;
            }

            document.getElementById('current-channel').textContent = `▶ CARREGANDO: ${channel.name}...`;

            if (Hls.isSupported() && (channel.url.includes('.m3u8') || proxyUrl.includes('.m3u8'))) {
                const hls = new Hls();
                window.currentHls = hls;
                hls.loadSource(proxyUrl);
                hls.attachMedia(player);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    player.play().catch(e => console.log('Autoplay bloqueado'));
                    document.getElementById('current-channel').textContent = `▶ REPRODUZINDO: ${channel.name}`;
                });
                hls.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) document.getElementById('current-channel').textContent = `❌ FALHA: ${channel.name}`;
                });
            } else {
                player.src = proxyUrl;
                player.play();
                document.getElementById('current-channel').textContent = `▶ REPRODUZINDO: ${channel.name}`;
            }
        }

        function backupSystem() {
            if (!channels.length) return alert('Nenhum dado para backup.');
            const data = JSON.stringify(channels, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_iptv_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert('✅ Backup gerado!');
        }

        window.onload = initSystem;
    </script>
</body>
</html>
